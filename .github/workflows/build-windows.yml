name: Build Windows (Cross-compile from Linux)

on:
  push:
    branches: [ main ]
    paths:
      - 'cmd/dcgm-exporter/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Verify Go version
        run: go version

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go dependencies
        run: |
          go mod download -v
          go mod verify

      - name: Build dcgm-exporter for Windows (cross-compile)
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: |
          cd cmd/dcgm-exporter
          go build \
            -v \
            -trimpath \
            -ldflags "-X main.BuildVersion=4.6.0-4.8.3" \
            -o dcgm-exporter.exe
          echo "✓ Build succeeded"
          ls -lh dcgm-exporter.exe
          file dcgm-exporter.exe
          cd ../..

      - name: Verify binary
        run: |
          if [ -f "cmd/dcgm-exporter/dcgm-exporter.exe" ]; then
            echo "✓ Binary created successfully"
            ls -lh cmd/dcgm-exporter/dcgm-exporter.exe
            file cmd/dcgm-exporter/dcgm-exporter.exe
          else
            echo "✗ Binary not found!"
            exit 1
          fi

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: dcgm-exporter-windows-x86_64
          path: cmd/dcgm-exporter/dcgm-exporter.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/dcgm-exporter/dcgm-exporter.exe
          tag_name: windows-build-${{ github.run_number }}
          name: Windows Build #${{ github.run_number }}
          draft: false
          prerelease: true
          body: |
            Automated Windows build of dcgm-exporter (cross-compiled from Linux)
            Build: ${{ github.run_id }}
            Commit: ${{ github.sha }}
            Architecture: x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
